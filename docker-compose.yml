# ═══════════════════════════════════════════════════════════════════════
# NexusAI — Docker Compose (alternative to PM2 bare-metal deploy)
#
# This is an ALTERNATIVE deployment method using Docker.
# For the recommended VPS deployment, use: bash deploy.sh nexus.aenews.net
#
# If using Docker, pair with Nginx + certbot on the host for SSL.
# The container only exposes port 3000 internally.
# ═══════════════════════════════════════════════════════════════════════

services:
  nexusai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusai-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.local
    volumes:
      - nexusai-data:/app/data
      - nexusai-generated:/app/public/generated
    mem_limit: 2g
    cpus: 2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  nexusai-data:
    driver: local
  nexusai-generated:
    driver: local