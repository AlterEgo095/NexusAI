# ═══════════════════════════════════════════════════════════════════════
# NexusAI — Nginx Reverse Proxy Configuration
# Domain: nexus.aenews.net
# ═══════════════════════════════════════════════════════════════════════
#
# Place this file in: /etc/nginx/sites-available/nexus.aenews.net
# Then: ln -sf /etc/nginx/sites-available/nexus.aenews.net /etc/nginx/sites-enabled/
#
# After certbot setup, certbot will modify this file to add SSL directives.
# ═══════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    server_name nexus.aenews.net;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (certbot will add this, but we pre-configure it)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block — certbot will fill in the SSL paths
# If certbot hasn't run yet, comment this block, run certbot first, then uncomment
# Or just run: certbot --nginx -d nexus.aenews.net
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name nexus.aenews.net;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/nexus.aenews.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus.aenews.net/privkey.pem;

    # SSL hardening (certbot may override, these are safe defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to NexusAI (Next.js on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for AI responses (can be slow)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # WebSocket support for real-time features
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static files caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Generated files (images, documents)
    location /generated/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Upload size limit
    client_max_body_size 50m;
}