# ══════════════════════════════════════════════════════════════
# NEXUS.AENEWS.NET — Nginx Vhost (HARDENED)
# NexusAI: nexus.aenews.net → localhost:3000
# SSL: Wildcard cert (*.aenews.net) — /etc/nginx/ssl/aenews.net.*
# Last updated: 2026-06-19
# ══════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=nexus_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=nexus_auth:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=nexus_api:10m rate=30r/s;

# ── Connection Limiting ──
limit_conn_zone $binary_remote_addr zone=nexus_conn:10m;

# ── Upstream ──
upstream nexus_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ═══════════════════════════════════════════
# REDIRECT HTTP → HTTPS
# ═══════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name nexus.aenews.net;

    location = /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    location ~ /\. { deny all; access_log off; log_not_found off; }
}

# ═══════════════════════════════════════════
# HTTPS — nexus.aenews.net
# ═══════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus.aenews.net;

    # ── SSL (Wildcard cert) ──
    ssl_certificate /etc/nginx/ssl/aenews.net.crt;
    ssl_certificate_key /etc/nginx/ssl/aenews.net.key;
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Hide server info ──
    proxy_hide_header X-Powered-By;
    server_tokens off;

    # ── Limits ──
    client_max_body_size 50M;
    limit_conn nexus_conn 30;

    # ── Logging ──
    access_log /var/log/nginx/nexus.access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/nexus.error.log warn;

    # ══════════════════════════════════════════
    # Health Check
    # ══════════════════════════════════════════
    location = /health {
        access_log off;
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # ══════════════════════════════════════════
    # WebSocket (Socket.io / real-time)
    # ══════════════════════════════════════════
    location /socket.io/ {
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ══════════════════════════════════════════
    # API Routes — Higher rate limit for AI ops
    # ══════════════════════════════════════════
    location /api/ {
        limit_req zone=nexus_api burst=50 nodelay;
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # AI responses can be slow
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ══════════════════════════════════════════
    # Next.js Static Assets — Aggressive caching
    # ══════════════════════════════════════════
    location /_next/static/ {
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ══════════════════════════════════════════
    # Generated files (images, docs)
    # ══════════════════════════════════════════
    location /generated/ {
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=86400";
    }

    # ══════════════════════════════════════════
    # Main App
    # ══════════════════════════════════════════
    location / {
        limit_req zone=nexus_general burst=30 nodelay;
        proxy_pass http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # ── Block sensitive files ──
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ^/(\.env|\.git|docker-compose|Dockerfile|node_modules) { deny all; access_log off; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|administrator) { return 444; }
}